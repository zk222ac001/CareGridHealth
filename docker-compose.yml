services:
  postgres:
    image: postgres:16-alpine
    container_name: caregrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caregrid_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d caregrid_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    env_file: .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caregrid-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/caregrid_health?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-caregrid.health@gmail.com}
      MAIL_PASS: ${MAIL_PASS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-caregrid.health@gmail.com}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: caregrid-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
